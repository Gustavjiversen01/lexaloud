name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Only 3.12 in v0.2.0. Python 3.11 is blocked by the system
        # python3-gi binding on Ubuntu 24.04 being compiled for 3.12.
        # Python 3.13 is deferred pending phonemizer-fork / pysbd wheels.
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 \
            python3-gi \
            gir1.2-gtk-3.0 \
            gir1.2-ayatanaappindicator3-0.1 \
            wl-clipboard \
            xclip \
            libnotify-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run pytest
        # Deselects:
        # - test_real_environment_is_gpu_only: asserts onnxruntime-gpu is
        #   installed at runtime; CI has neither ORT variant installed
        #   because scripts/install.sh (which handles the kokoro-onnx
        #   no-deps dance) is the supported install path, not pip.
        # - test_assert_onnxruntime_env_detects_gpu_only / cpu_only:
        #   these mock _is_installed but the function also does a real
        #   `import onnxruntime` as a sanity check, which fails in CI.
        #   The neither/both/corrupted-install variants work fine and
        #   still exercise the function.
        # Ignored:
        # - tests/test_real_kokoro_smoke.py: opt-in real-model test.
        run: |
          python -m pytest tests/ \
            --deselect tests/test_models_verify.py::test_real_environment_is_gpu_only \
            --deselect tests/test_models_verify.py::test_assert_onnxruntime_env_detects_gpu_only \
            --deselect tests/test_models_verify.py::test_assert_onnxruntime_env_detects_cpu_only \
            --ignore=tests/test_real_kokoro_smoke.py \
            -q
