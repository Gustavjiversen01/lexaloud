name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: python -m pip install ruff>=0.6
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  mypy:
    runs-on: ubuntu-24.04
    # Mypy starts in permissive mode per the plan — it should not block
    # merges until the type coverage stabilizes. Tighten in v0.2.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mypy and package deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: mypy
        run: mypy src/lexaloud

  pip-audit:
    runs-on: ubuntu-24.04
    # pip-audit can surface CVEs that the maintainer hasn't triaged yet.
    # Treat it as informational in v0.1.0 so the workflow stays green
    # while we wire up the --ignore-vuln triage list. Tighten in v0.2.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + pip-audit
        # Installing the package via extras also pulls in the pinned
        # runtime deps (minus kokoro-onnx, which isn't declared in the
        # dependencies list — that's installed out-of-band via
        # scripts/install.sh). pip-audit audits the whole venv.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Audit installed dependencies
        # --disable-pip only works with hashed requirements. Our lockfiles
        # are not hashed yet (v0.1.1 morning task). Audit the currently-
        # installed venv instead, which pip-audit does via
        # importlib.metadata.
        run: pip-audit --progress-spinner off
