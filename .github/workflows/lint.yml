name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: python -m pip install ruff>=0.6
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  mypy:
    runs-on: ubuntu-24.04
    # Mypy starts in permissive mode per the plan — it should not block
    # merges until the type coverage stabilizes. Tighten in v0.2.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mypy and package deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: mypy
        run: mypy src/lexaloud

  pip-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: python -m pip install pip-audit>=2.7
      - name: Audit locked dependencies
        # Ignore vulnerability IDs that the maintainer has reviewed and
        # accepted via a GitHub issue. Populate as needed:
        #   --ignore-vuln GHSA-xxxx-yyyy-zzzz
        run: |
          if [ -f requirements-lock.cpu.txt ]; then
            pip-audit -r requirements-lock.cpu.txt --disable-pip
          elif [ -f requirements-lock.txt ]; then
            pip-audit -r requirements-lock.txt --disable-pip
          else
            echo "no lockfile found; skipping"
            exit 0
          fi
