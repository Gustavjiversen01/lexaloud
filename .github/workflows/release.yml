name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # for creating the GitHub release
  id-token: write   # for PyPI trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for any setuptools_scm future use

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distribution
          path: dist/

  pypi-publish:
    name: Publish to PyPI via trusted publishing
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/lexaloud/
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distribution
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # NOTE: trusted publisher must be configured on pypi.org once before
        # this job can succeed. See docs/release.md (or morning-checklist.md)
        # for setup instructions.

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: distribution
          path: dist/
      - name: Extract CHANGELOG excerpt
        id: changelog
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section of CHANGELOG.md between the matching
          # [VERSION] header and the next version header.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG section for $VERSION" > /tmp/release-notes.md
          fi
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: dist/*
          fail_on_unmatched_files: false
