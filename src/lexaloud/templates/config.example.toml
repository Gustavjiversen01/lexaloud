# Lexaloud example configuration.
#
# Copy this file to ~/.config/lexaloud/config.toml and edit to taste.
# Missing sections or keys fall back to the defaults shown below.
#
# For a full reference, see docs/configuration.md.

[capture]
# Maximum selection size in bytes. Larger selections are truncated on
# a UTF-8 character boundary and the CLI shows a notification.
max_bytes = 204800  # 200 KB
# Timeout for the wl-paste / xclip / xsel subprocess call.
subprocess_timeout_s = 2.0

[daemon]
# host/port are deprecated in v0.1.0: the daemon binds a Unix domain
# socket at $XDG_RUNTIME_DIR/lexaloud/lexaloud.sock instead. These
# fields are kept for forward compat and will be removed in v0.2.
host = "127.0.0.1"
port = 5487
# Max completed sentence chunks buffered between the provider and the
# audio sink. Bounds memory during pause or slow playback.
ready_queue_depth = 3

[provider]
# Voice selection. The curated list shown in the Control window is in
# src/lexaloud/gui_control.py (KOKORO_VOICES). Any Kokoro v1.0 voice name
# works here, not just curated ones.
voice = "af_heart"
lang = "en-us"
# Playback speed multiplier. Safe range for dense academic prose is
# 0.85-1.3; outside that comprehension drops, especially on unfamiliar
# material. The Control window slider enforces 0.5-2.0 as a hard range.
speed = 1.0

[preprocessor]
# Deduplicate math captured from MathJax/KaTeX-rendered pages. Browser
# selection on such pages captures each expression twice (once stacked
# one-char-per-line, once compact) — this detector removes the stacked
# copy. No-op on non-MathJax input.
dedupe_mathjax_selection = true
# Strip markdown formatting (headings, lists, emphasis, tables, code
# blocks, links, images). Converts to natural prose suitable for TTS.
# Fast-path no-op when the input contains no markdown markers.
strip_markdown = true
# Strip numeric bracket citations like [3] or [1-4]
strip_numeric_bracket_citations = true
# Strip author-year parenthetical citations like (Smith 2023) — off by
# default because it can over-match ordinary parentheticals.
strip_parenthetical_citations = false
# Expand Latin abbreviations (e.g., i.e., etc.) to full forms
expand_latin_abbreviations = true
# Expand academic abbreviations (Fig., Eq., Sec., Thm., etc.)
expand_academic_abbreviations = true
# Convert numbers to spoken words (1,234 -> one thousand two hundred
# thirty-four, 50% -> fifty percent, $100 -> one hundred dollars).
# Numbers after reference words (Figure 3, Section 2.1) are left as-is.
normalize_numbers = true
# Replace URLs with "link to [domain]" and emails with "[name] at [domain]"
normalize_urls = true
# Expand Unicode math symbols (Greek letters, operators) to spoken words.
# Only Unicode codepoints — ASCII operators (<=, ->) are NOT expanded.
normalize_math_symbols = true
# PDF-style text cleanup (hyphenation across line breaks, etc.)
pdf_cleanup = true

[advanced]
# Show a floating overlay bar when Lexaloud is speaking. The overlay
# displays the current sentence and has pause/skip/stop buttons.
# Off by default to keep Lexaloud discreet. Enable if you want visual
# feedback during playback.
overlay = false

# --- LLM-based text normalization (optional) ---
# Requires: pip install lexaloud[llm]  (or install.sh --with-llm)
#           lexaloud download-models --llm
# Uses a local ~1.5B parameter model to normalize edge cases the
# rule-based pipeline can't handle (complex math, domain acronyms,
# OCR artifacts, tables). Adds ~1.2 GB VRAM usage. Off by default.
#
# [normalizer]
# enabled = false
# model_repo = "Qwen/Qwen2.5-1.5B-Instruct-GGUF"
# model_file = "qwen2.5-1.5b-instruct-q4_k_m.gguf"
# n_gpu_layers = -1   # -1 = all layers on GPU; set 0 for CPU-only
# n_ctx = 4096
# temperature = 0.0
# max_output_ratio = 1.5
#
# Custom acronym glossary — applied deterministically BEFORE the LLM.
# Each key is matched as a whole word; the value is the spoken replacement.
# This sub-table must appear after the [normalizer] scalar keys and
# before the next [section].
#
# [normalizer.glossary]
# MAPPO = "Multi-Agent Proximal Policy Optimization"
# GCBF = "Graph Control Barrier Function"

# --- Speech Rule Engine LaTeX-to-speech (optional) ---
# Requires Node.js >=18 and speech-rule-engine@4.1.3, installed via
#   scripts/install.sh --with-math-speech
# When enabled, LaTeX spans ($...$, $$...$$, \begin{equation}...) in
# captured text get replaced with natural English ("x squared",
# "a over b", "sum over t of r of x sub t"). Graceful no-op if the
# sre binary is not resolvable. Off by default.
#
# [sre_latex]
# enabled = false
# timeout_s = 10.0
# domain = "clearspeak"   # "clearspeak" or "mathspeak"
# style = ""               # empty = omit -s flag; try "verbose" or "short"
