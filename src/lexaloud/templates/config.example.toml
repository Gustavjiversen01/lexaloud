# Lexaloud example configuration.
#
# Copy this file to ~/.config/lexaloud/config.toml and edit to taste.
# Missing sections or keys fall back to the defaults shown below.
#
# For a full reference, see docs/configuration.md.

[capture]
# Maximum selection size in bytes. Larger selections are truncated on
# a UTF-8 character boundary and the CLI shows a notification.
max_bytes = 204800  # 200 KB
# Timeout for the wl-paste / xclip / xsel subprocess call.
subprocess_timeout_s = 2.0

[daemon]
# host/port are deprecated in v0.1.0: the daemon binds a Unix domain
# socket at $XDG_RUNTIME_DIR/lexaloud/lexaloud.sock instead. These
# fields are kept for forward compat and will be removed in v0.2.
host = "127.0.0.1"
port = 5487
# Max completed sentence chunks buffered between the provider and the
# audio sink. Bounds memory during pause or slow playback.
ready_queue_depth = 3

[provider]
# Voice selection. The curated list shown in the Control window is in
# src/lexaloud/gui_control.py (KOKORO_VOICES). Any Kokoro v1.0 voice name
# works here, not just curated ones.
voice = "af_heart"
lang = "en-us"
# Playback speed multiplier. Safe range for dense academic prose is
# 0.85-1.3; outside that comprehension drops, especially on unfamiliar
# material. The Control window slider enforces 0.5-2.0 as a hard range.
speed = 1.0

[preprocessor]
# Strip numeric bracket citations like [3] or [1-4]
strip_numeric_bracket_citations = true
# Strip author-year parenthetical citations like (Smith 2023) — off by
# default because it can over-match ordinary parentheticals.
strip_parenthetical_citations = false
# Expand Latin abbreviations (e.g., i.e., etc.) to full forms
expand_latin_abbreviations = true
# Expand academic abbreviations (Fig., Eq., Sec., Thm., etc.)
expand_academic_abbreviations = true
# PDF-style text cleanup (hyphenation across line breaks, etc.)
pdf_cleanup = true

[advanced]
# Show a floating overlay bar when Lexaloud is speaking. The overlay
# displays the current sentence and has pause/skip/stop buttons.
# Off by default to keep Lexaloud discreet. Enable if you want visual
# feedback during playback.
overlay = false
